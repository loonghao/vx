# Release Please workflow
# Runs on push to main to create/update release PRs
# When a release PR is merged, creates a GitHub Release and tag
# Then triggers the cargo-dist Release workflow via workflow_dispatch
#
# Note: Tags created by GITHUB_TOKEN do NOT trigger other workflows'
# on.push.tags events (GitHub security limitation). We work around this
# by explicitly dispatching the Release workflow after release creation.
#
# IMPORTANT: We skip this workflow when the push is itself a release commit
# (e.g., "chore: release v0.8.10"). Without this guard, merging a release PR
# would re-trigger release-please, which would immediately open a *new*
# (duplicate) release PR for the same or next version, and also cause every
# other push-to-main workflow to fire unnecessarily.

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Skip when the merged commit is itself a release commit to prevent
    # duplicate release PRs (e.g., #709 merged -> immediately opens #713).
    if: >-
      !startsWith(github.event.head_commit.message, 'chore: release')
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger Release workflow
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Release created, triggering cargo-dist Release workflow..."
          echo "Tag: ${{ steps.release.outputs.tag_name }}"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --field "tag=${{ steps.release.outputs.tag_name }}"
