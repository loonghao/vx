name: Sync Skills to ClawHub

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
  workflow_dispatch:
  # Also trigger when a release is published, to ensure skills stay in sync
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    if: github.repository == 'loonghao/vx'

    steps:
      - uses: actions/checkout@v6

      - name: Check skills directory
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Skills directory contents:"
          ls -la skills/
          echo "---"
          find skills/ -type f | head -50

      - name: Package skills
        run: |
          cd skills
          zip -r ../vx-skills.zip .
          cd ..
          echo "Packaged skills: $(ls -lh vx-skills.zip)"
          echo "Contents:"
          unzip -l vx-skills.zip | head -50

      - name: Upload skill artifact
        uses: actions/upload-artifact@v6
        with:
          name: vx-skills
          path: vx-skills.zip
          retention-days: 30

      - name: Sync to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::warning::CLAWHUB_TOKEN secret is not configured. Please add it to repository secrets to enable ClawHub sync."
            exit 0
          fi

          echo "Syncing vx skills to ClawHub..."
          echo "Commit: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"

          # Upload skill package to ClawHub API
          HTTP_CODE=$(curl -s -o /tmp/clawhub_response.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $CLAWHUB_TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "skill=@vx-skills.zip" \
            -F "name=vx" \
            -F "repository=loonghao/vx" \
            "https://api.clawhub.ai/v1/skills/publish")

          echo "HTTP Status: $HTTP_CODE"
          echo "Response:"
          cat /tmp/clawhub_response.txt
          echo ""

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Successfully synced vx skills to ClawHub"
          else
            echo "::warning::ClawHub sync failed with HTTP $HTTP_CODE (non-fatal)"
          fi
