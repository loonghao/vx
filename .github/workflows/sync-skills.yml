name: Sync Skills to ClawHub

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
  workflow_dispatch:
  # Also trigger when a release is published, to ensure skills stay in sync
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: sync-skills-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository == 'loonghao/vx'

    steps:
      - uses: actions/checkout@v6

      - name: Check skills directory
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Skills directory contents:"
          ls -la skills/
          echo "---"
          find skills/ -type f | head -50

      - name: Package skills
        run: |
          cd skills
          zip -r ../vx-skills.zip .
          cd ..
          echo "Packaged skills: $(ls -lh vx-skills.zip)"
          echo "Contents:"
          unzip -l vx-skills.zip | head -50

      - name: Upload skill artifact
        uses: actions/upload-artifact@v6
        with:
          name: vx-skills
          path: vx-skills.zip
          if-no-files-found: error
          retention-days: 30

      - name: Sync to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::error::CLAWHUB_TOKEN secret is not configured. Add it to repository secrets before merging skills changes to main."
            exit 1
          fi

          echo "Syncing vx skills to ClawHub..."
          echo "Commit: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"

          # Upload skill package to ClawHub API
          HTTP_CODE=$(curl -sS -o /tmp/clawhub_response.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $CLAWHUB_TOKEN" \
            -F "skill=@vx-skills.zip" \
            -F "name=vx" \
            -F "repository=loonghao/vx" \
            "https://api.clawhub.ai/v1/skills/publish")

          echo "HTTP Status: $HTTP_CODE"
          echo "Response:"
          cat /tmp/clawhub_response.txt
          echo ""

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Successfully synced vx skills to ClawHub"
            {
              echo "## ClawHub sync"
              echo "- Status: success"
              echo "- Commit: \`${{ github.sha }}\`"
              echo "- Ref: \`${{ github.ref }}\`"
              echo "- Package: \`vx-skills.zip\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::ClawHub sync failed with HTTP $HTTP_CODE"
            exit 1
          fi
