[build.env]
passthrough = ["GITHUB_TOKEN", "RUSTC_WRAPPER"]

# musl targets now use rustls (pure Rust TLS), no OpenSSL needed
# Install lld since .cargo/config.toml sets -fuse-ld=lld for musl targets
[target.x86_64-unknown-linux-musl]
pre-build = ["apt-get update && apt-get install -y lld"]

[target.aarch64-unknown-linux-musl]
pre-build = ["apt-get update && apt-get install -y lld"]

# workaround for https://github.com/cross-rs/cross/issues/1345
[target.x86_64-unknown-netbsd]
pre-build = [
  "mkdir -p /tmp/netbsd",
  "curl https://archive.netbsd.org/pub/NetBSD-archive/NetBSD-9.2/amd64/binary/sets/base.tar.xz -O",
  "tar -C /tmp/netbsd -xJf base.tar.xz",
  "cp /tmp/netbsd/usr/lib/libexecinfo.so /usr/local/x86_64-unknown-netbsd/lib",
  "rm base.tar.xz",
  "rm -rf /tmp/netbsd",
]
