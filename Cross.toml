[build.env]
passthrough = ["GITHUB_TOKEN", "RUSTC_WRAPPER", "AWS_LC_SYS_NO_ASM"]

# Install lld (required by .cargo/config.toml -fuse-ld=lld) and cmake (required by aws-lc-rs)
[target.aarch64-unknown-linux-gnu]
pre-build = ["apt-get update && apt-get install -y lld cmake"]

# musl targets: lld for linker, cmake for aws-lc-rs C code cross-compilation
[target.x86_64-unknown-linux-musl]
pre-build = ["apt-get update && apt-get install -y lld cmake"]

[target.aarch64-unknown-linux-musl]
pre-build = ["apt-get update && apt-get install -y lld cmake"]

# workaround for https://github.com/cross-rs/cross/issues/1345
[target.x86_64-unknown-netbsd]
pre-build = [
  "mkdir -p /tmp/netbsd",
  "curl https://archive.netbsd.org/pub/NetBSD-archive/NetBSD-9.2/amd64/binary/sets/base.tar.xz -O",
  "tar -C /tmp/netbsd -xJf base.tar.xz",
  "cp /tmp/netbsd/usr/lib/libexecinfo.so /usr/local/x86_64-unknown-netbsd/lib",
  "rm base.tar.xz",
  "rm -rf /tmp/netbsd",
]
